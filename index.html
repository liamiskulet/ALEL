<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        input { padding: 15px; width: 300px; border-radius: 25px; border: none; outline: none; }
        .cloak-btn { margin-top: 20px; padding: 10px; cursor: pointer; background: #333; color: #ccc; border: none; }
    </style>
</head>
<body>

    <h1>Search Engine</h1>
    <input type="text" id="search-bar" placeholder="Enter URL or search...">
    
    <div class="menu">
        <button class="cloak-btn" onclick="cloak('Google Drive', 'https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png')">Cloak as Drive</button>
        <button class="cloak-btn" onclick="reset()">Reset</button>
    </div>

    <script>
        const PROXY_URL = "YOUR_CLOUDFLARE_WORKER_URL_HERE"; // Put your URL here!

        document.getElementById('search-bar').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                let input = this.value;
                if (!input.startsWith('http')) input = 'https://' + input;
                
                // Redirect through your Cloudflare Worker
                window.location.href = `${PROXY_URL}/?url=${encodeURIComponent(input)}`;
            }
        });

        function cloak(title, icon) {
            document.title = title;
            let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
            link.type = 'image/x-icon';
            link.rel = 'shortcut icon';
            link.href = icon;
            document.getElementsByTagName('head')[0].appendChild(link);
            localStorage.setItem('cloak', JSON.stringify({title, icon}));
        }

        function reset() {
            localStorage.removeItem('cloak');
            window.location.reload();
        }
    </script>
</body>
</html>
